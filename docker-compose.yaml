services:
  # ===== OpenClaw Gateway (Agent Runtime) =====
  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./openclaw/workspace:/root/.openclaw/workspace
      - ./openclaw/openclaw.json:/openclaw-config/openclaw.json:ro
      - openclaw_data:/root/.openclaw/data
      - openclaw_cron:/root/.openclaw/cron
      - ./scripts:/scripts:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=http://llm-proxy:4010/api/v3
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN}
      - BLOG_INTERNAL_TOKEN=${BLOG_INTERNAL_TOKEN}
    ports:
      - "18789:18789"
    command: >
      sh -c "cp /openclaw-config/openclaw.json /root/.openclaw/openclaw.json &&
      openclaw gateway --allow-unconfigured --bind lan --port 18789"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      blog:
        condition: service_healthy
      llm-proxy:
        condition: service_healthy
      searxng:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "openclaw"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # ===== Blog Service (Next.js) =====
  blog:
    build:
      context: ./blog
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./openclaw/workspace:/openclaw-workspace
      - ./openclaw/openclaw.json:/openclaw-config/openclaw.json
      - ./llm-proxy/routes.json:/llm-proxy-config/routes.json
    environment:
      - DATABASE_URL=postgresql://blog:${BLOG_PG_PASSWORD}@blog-db:5432/blog?client_encoding=utf8
      - BLOG_INTERNAL_TOKEN=${BLOG_INTERNAL_TOKEN}
      - OPENCLAW_HOOK_URL=http://openclaw:18789/hooks/agent
      - OPENCLAW_HOOK_TOKEN=${OPENCLAW_HOOKS_TOKEN}
      - DAILY_TOKEN_BUDGET_CENTS=${DAILY_TOKEN_BUDGET_CENTS:-200}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - QUEUE_PATH=/openclaw-workspace/queue.json
      - OPENCLAW_CONFIG_PATH=/openclaw-config/openclaw.json
      - LLM_PROXY_ROUTES_PATH=/llm-proxy-config/routes.json
      - OPENCLAW_PERSONA_PATH=/openclaw-workspace/persona.yaml
      - OPENCLAW_SOURCES_PATH=/openclaw-workspace/skills/blog-explore/sources.yaml
      - OPS_CONTROL_URL=http://ops-control:4020/ops/restart
      - OPS_CONTROL_TOKEN=${OPS_CONTROL_TOKEN}
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    ports:
      - "3005:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://$(hostname -i):3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      blog-db:
        condition: service_healthy
      ops-control:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "blog"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ===== Blog Database (PostgreSQL) =====
  blog-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: ${BLOG_PG_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    volumes:
      - blog_pgdata:/var/lib/postgresql/data
      - ./scripts/setup-db.sql:/docker-entrypoint-initdb.d/01-setup.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        tag: "blog-db"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c log_min_duration_statement=1000
      -c log_statement=ddl
      -c client_encoding=UTF8

  # ===== SearXNG (Self-hosted Search Engine) =====
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        tag: "searxng"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  # ===== LLM Proxy (Multi-model router) =====
  llm-proxy:
    build:
      context: ./llm-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./llm-proxy/routes.json:/app/routes.json
    environment:
      - TARGET_BASE_URL=https://ark.cn-beijing.volces.com/api/v3
      - TARGET_MODEL=doubao-seed-2-0-pro-260215
      - LLM_PROXY_ROUTES_PATH=/app/routes.json
      - LLM_PROXY_ADMIN_TOKEN=${LLM_PROXY_ADMIN_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        tag: "llm-proxy"

  # ===== Ops Control (safe service restart) =====
  ops-control:
    build:
      context: ./ops-control
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - OPS_CONTROL_TOKEN=${OPS_CONTROL_TOKEN}
      - DOCKER_COMPOSE_FILE=/repo/docker-compose.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/repo:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4020/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  openclaw_data:
  openclaw_cron:
  blog_pgdata:
