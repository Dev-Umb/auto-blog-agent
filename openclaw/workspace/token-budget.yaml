# Token Budget Configuration
# Costs are in cents (USD). Adjust based on your LLM provider pricing.

daily_budget_cents: 200

# Per-model cost estimates (per 1M tokens, in cents)
model_costs:
  "google/gemini-2.0-flash":
    input: 10      # $0.10 / 1M input tokens
    output: 40     # $0.40 / 1M output tokens
  "anthropic/claude-sonnet-4-20250514":
    input: 300     # $3.00 / 1M input tokens
    output: 1500   # $15.00 / 1M output tokens
  "google/gemini-2.5-pro":
    input: 125     # $1.25 / 1M input tokens
    output: 1000   # $10.00 / 1M output tokens
  default:
    input: 50
    output: 200

# Per-cycle budget allocation (percentage of daily budget)
cycle_budgets:
  explore: 20      # 20% for exploration
  write: 55        # 55% for writing (most expensive)
  interact: 15     # 15% for interaction
  reflect: 10      # 10% for reflection (weekly, amortized)

# Budget mode thresholds (percentage of daily budget used)
thresholds:
  warning: 80      # Switch to conservative mode
  exceeded: 100    # Pause non-essential cycles

# Actions per budget mode
modes:
  normal:
    explore_interval_minutes: 20
    max_articles_per_day: 3
    max_search_per_explore: 10
    write_min_score: 30
  warning:
    explore_interval_minutes: 40
    max_articles_per_day: 1
    max_search_per_explore: 5
    write_min_score: 40
  exceeded:
    explore_interval_minutes: 0   # paused
    max_articles_per_day: 0       # paused
    max_search_per_explore: 0
    write_min_score: 999          # effectively paused
